<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 자리배치 프로그램</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
background:linear-gradient(135deg,#4f46e5,#06b6d4,#22c55e);
min-height:100vh;
padding:30px;
font-family:'Pretendard',sans-serif;
}

.glass{
background:rgba(255,255,255,.15);
backdrop-filter:blur(18px);
border-radius:25px;
padding:30px;
box-shadow:0 15px 40px rgba(0,0,0,.25);
}

.seat{
background:white;
border-radius:15px;
padding:10px;
height:80px;
display:flex;
justify-content:center;
align-items:center;
font-weight:bold;
box-shadow:0 5px 15px rgba(0,0,0,.15);
transition:.3s;
}

.seat:hover{
transform:scale(1.05);
}

.teacher{
background:#f59e0b;
color:white;
padding:10px;
font-size:20px;
font-weight:bold;
border-radius:15px;
margin-bottom:20px;
text-align:center;
}

#seatArea{
background:white;
padding:20px;
border-radius:20px;
}

textarea{
height:250px;
}
</style>
</head>

<body>

<div class="container">

<div class="glass">

<h1 class="text-center text-white fw-bold mb-4">
📚 랜덤 자리배치
</h1>

<div class="row">

<div class="col-lg-4">

<label class="text-white mb-2">
학생 이름 (한 줄에 한 명)
</label>

<textarea
id="names"
class="form-control"
placeholder="김철수&#10;이영희&#10;박민수"></textarea>

<div class="row mt-3">

<div class="col">
<input id="rows" class="form-control" type="number" value="5">
<small class="text-white">행</small>
</div>

<div class="col">
<input id="cols" class="form-control" type="number" value="6">
<small class="text-white">열</small>
</div>

</div>

<div class="d-grid gap-2 mt-4">

<button class="btn btn-warning btn-lg" onclick="makeSeats()">
🎲 랜덤 자리배치
</button>

<button class="btn btn-success btn-lg" onclick="savePDF()">
💾 PDF 저장
</button>

</div>

</div>

<div class="col-lg-8">

<div id="seatArea">

<div class="teacher">
👨‍🏫 교탁
</div>

<div id="grid"></div>

</div>

</div>

</div>

</div>

</div>

<script>

function shuffle(arr){

for(let i=arr.length-1;i>0;i--){

let j=Math.floor(Math.random()*(i+1));

[arr[i],arr[j]]=[arr[j],arr[i]];

}

return arr;

}

function makeSeats(){

let names=document.getElementById("names").value
.split("\n")
.map(v=>v.trim())
.filter(v=>v!="");

if(names.length==0){

Swal.fire("학생 이름을 입력하세요.");

return;

}

shuffle(names);

let rows=parseInt(document.getElementById("rows").value);
let cols=parseInt(document.getElementById("cols").value);

let total=rows*cols;

while(names.length<total){

names.push("");

}

let html=`<div class="row g-3">`;

let index=0;

for(let r=0;r<rows;r++){

html+=`<div class="col-12"><div class="row g-3">`;

for(let c=0;c<cols;c++){

html+=`
<div class="col">
<div class="seat">
${names[index]==""?"<span class='text-secondary'>빈자리</span>":names[index]}
</div>
</div>
`;

index++;

}

html+=`</div></div>`;

}

html+="</div>";

document.getElementById("grid").innerHTML=html;

Swal.fire({

icon:"success",

title:"자리배치 완료!",

text:"랜덤으로 배치되었습니다.",

confirmButtonColor:"#22c55e"

});

}

async function savePDF(){

const {jsPDF}=window.jspdf;

let target=document.getElementById("seatArea");

const canvas=await html2canvas(target,{scale:2});

const img=canvas.toDataURL("image/png");

const pdf=new jsPDF("landscape","mm","a4");

let w=280;

let h=canvas.height*w/canvas.width;

pdf.addImage(img,"PNG",8,8,w,h);

pdf.save("자리배치표.pdf");

Swal.fire({

icon:"success",

title:"PDF 저장 완료"

});

}

</script>

</body>
</html>
